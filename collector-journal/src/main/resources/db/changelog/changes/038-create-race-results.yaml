databaseChangeLog:
  - changeSet:
      id: 038-create-race-results
      author: zensyra
      comment: Creates the race_results table for manual race outcomes and PMC correlation (Design 003 §1.4, tightened per #33). race_date is the join anchor with athlete_training_load.date.
      changes:
        - createTable:
            tableName: race_results
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_race_results
                    nullable: false
              - column:
                  name: athlete_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: race_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: race_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: distance_meters
                  type: DOUBLE PRECISION
                  constraints:
                    nullable: false
              - column:
                  name: goal_finish_time
                  type: INTEGER
              - column:
                  name: actual_finish_time
                  type: INTEGER
              - column:
                  name: position
                  type: INTEGER
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: linked_activity_id
                  type: UUID
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
        - sql:
            sql: >-
              ALTER TABLE race_results ADD CONSTRAINT chk_race_results_distance_positive
              CHECK (distance_meters > 0)
        - sql:
            sql: >-
              ALTER TABLE race_results ADD CONSTRAINT chk_race_results_positive_ints
              CHECK ((goal_finish_time IS NULL OR goal_finish_time > 0)
                 AND (actual_finish_time IS NULL OR actual_finish_time > 0)
                 AND (position IS NULL OR position > 0))
        - addForeignKeyConstraint:
            baseTableName: race_results
            baseColumnNames: athlete_id
            referencedTableName: athlete_profiles
            referencedColumnNames: id
            constraintName: fk_race_results_athlete_id
            onDelete: RESTRICT
        - createIndex:
            tableName: race_results
            indexName: idx_race_results_athlete_race_date
            columns:
              - column:
                  name: athlete_id
              - column:
                  name: race_date
      rollback:
        - dropIndex:
            indexName: idx_race_results_athlete_race_date
            tableName: race_results
        - dropForeignKeyConstraint:
            baseTableName: race_results
            constraintName: fk_race_results_athlete_id
        - sql:
            sql: ALTER TABLE race_results DROP CONSTRAINT chk_race_results_positive_ints
        - sql:
            sql: ALTER TABLE race_results DROP CONSTRAINT chk_race_results_distance_positive
        - dropTable:
            tableName: race_results
