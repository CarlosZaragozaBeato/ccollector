databaseChangeLog:
  - changeSet:
      id: 019-create-athlete-stats-snapshots
      author: zensyra
      changes:
        - createTable:
            tableName: athlete_stats_snapshots
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: athlete_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: snapshot_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: biggest_ride_distance
                  type: DOUBLE PRECISION
              - column:
                  name: biggest_climb_elevation_gain
                  type: DOUBLE PRECISION
              - column:
                  name: ytd_ride_count
                  type: INTEGER
              - column:
                  name: ytd_ride_distance
                  type: DOUBLE PRECISION
              - column:
                  name: ytd_ride_moving_time
                  type: INTEGER
              - column:
                  name: ytd_ride_elapsed_time
                  type: INTEGER
              - column:
                  name: ytd_ride_elevation_gain
                  type: DOUBLE PRECISION
              - column:
                  name: ytd_run_count
                  type: INTEGER
              - column:
                  name: ytd_run_distance
                  type: DOUBLE PRECISION
              - column:
                  name: ytd_run_moving_time
                  type: INTEGER
              - column:
                  name: ytd_run_elapsed_time
                  type: INTEGER
              - column:
                  name: ytd_run_elevation_gain
                  type: DOUBLE PRECISION
              - column:
                  name: ytd_swim_count
                  type: INTEGER
              - column:
                  name: ytd_swim_distance
                  type: DOUBLE PRECISION
              - column:
                  name: ytd_swim_moving_time
                  type: INTEGER
              - column:
                  name: ytd_swim_elapsed_time
                  type: INTEGER
              - column:
                  name: ytd_swim_elevation_gain
                  type: DOUBLE PRECISION
              - column:
                  name: all_ride_count
                  type: INTEGER
              - column:
                  name: all_ride_distance
                  type: DOUBLE PRECISION
              - column:
                  name: all_ride_moving_time
                  type: INTEGER
              - column:
                  name: all_ride_elapsed_time
                  type: INTEGER
              - column:
                  name: all_ride_elevation_gain
                  type: DOUBLE PRECISION
              - column:
                  name: all_run_count
                  type: INTEGER
              - column:
                  name: all_run_distance
                  type: DOUBLE PRECISION
              - column:
                  name: all_run_moving_time
                  type: INTEGER
              - column:
                  name: all_run_elapsed_time
                  type: INTEGER
              - column:
                  name: all_run_elevation_gain
                  type: DOUBLE PRECISION
              - column:
                  name: all_swim_count
                  type: INTEGER
              - column:
                  name: all_swim_distance
                  type: DOUBLE PRECISION
              - column:
                  name: all_swim_moving_time
                  type: INTEGER
              - column:
                  name: all_swim_elapsed_time
                  type: INTEGER
              - column:
                  name: all_swim_elevation_gain
                  type: DOUBLE PRECISION
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: athlete_stats_snapshots
            columnNames: athlete_id, snapshot_date
            constraintName: uq_athlete_stats_snapshots_athlete_date
        - addForeignKeyConstraint:
            baseTableName: athlete_stats_snapshots
            baseColumnNames: athlete_id
            referencedTableName: athletes
            referencedColumnNames: strava_id
            constraintName: fk_athlete_stats_snapshots_athlete_id
            onDelete: RESTRICT
        - createIndex:
            indexName: idx_athlete_stats_snapshots_athlete_date
            tableName: athlete_stats_snapshots
            columns:
              - column:
                  name: athlete_id
              - column:
                  name: snapshot_date
      rollback:
        - dropIndex:
            indexName: idx_athlete_stats_snapshots_athlete_date
            tableName: athlete_stats_snapshots
        - dropForeignKeyConstraint:
            baseTableName: athlete_stats_snapshots
            constraintName: fk_athlete_stats_snapshots_athlete_id
        - dropUniqueConstraint:
            tableName: athlete_stats_snapshots
            constraintName: uq_athlete_stats_snapshots_athlete_date
        - dropTable:
            tableName: athlete_stats_snapshots
