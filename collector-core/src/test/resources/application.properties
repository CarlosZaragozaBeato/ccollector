# Dev Services is disabled for tests in this module. Quarkus's bundled
# Testcontainers (resolved transitively via the quarkus-bom) negotiates an
# outdated Docker API version against recent Docker Engines (see Docker
# Engine 29.x / API 1.5x), which Dev Services cannot work around on its own.
#
# db-kind must be declared here, statically, because Hibernate ORM resolves
# the persistence unit descriptor at build time and needs to know a
# datasource of this kind exists. The actual connection details (host, port,
# credentials) are dynamic and are injected at test runtime by
# PostgresTestResource, which starts a real PostgreSQL container via the
# explicitly-pinned, working org.testcontainers:postgresql dependency.
quarkus.datasource.devservices.enabled=false
quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.database.generation=drop-and-create