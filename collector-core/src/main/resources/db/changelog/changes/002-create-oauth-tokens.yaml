databaseChangeLog:
  - changeSet:
      id: 002-create-oauth-tokens
      author: collector
      changes:
        - createTable:
            tableName: oauth_tokens
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_oauth_tokens

              - column:
                  name: source
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

              - column:
                  name: external_user_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: access_token
                  type: TEXT
                  constraints:
                    nullable: false

              - column:
                  name: refresh_token
                  type: TEXT
                  constraints:
                    nullable: false

              - column:
                  name: expires_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: oauth_tokens
            columnNames: source, external_user_id
            constraintName: uq_oauth_source_user

        - createIndex:
            tableName: oauth_tokens
            indexName: idx_oauth_source
            columns:
              - column:
                  name: source