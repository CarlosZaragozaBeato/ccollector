name: CCollector — Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run tests
        run: ./mvnw test -pl collector-core,collector-strava,collector-runner --also-make

  build-and-push:
    name: Build native image & push
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set image name (lowercase)
        id: image
        run: |
          echo "name=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/zensyra_collector/collector" >> $GITHUB_OUTPUT
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build native binary
        run: |
          ./mvnw package -Pnative \
            -pl collector-runner --also-make \
            -DskipTests \
            -Dquarkus.native.container-build=true
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: collector-runner/src/main/docker/Dockerfile.native
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}

  update-coolify-compose:
    name: Update Coolify compose digest
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]' && vars.RELEASE_ENABLED == 'true'
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Set image name (lowercase)
        id: image
        run: |
          echo "name=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/zensyra_collector/collector" >> $GITHUB_OUTPUT
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Pull latest image
        run: docker pull ${{ steps.image.outputs.name }}:latest
      - name: Resolve digest with docker inspect
        id: digest
        run: |
          IMAGE_WITH_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ steps.image.outputs.name }}:latest)
          echo "image_with_digest=$IMAGE_WITH_DIGEST" >> $GITHUB_OUTPUT
          echo "Resolved digest: $IMAGE_WITH_DIGEST"
      - name: Update docker-compose.coolify.yml
        run: |
          sed -i "s|^\([[:space:]]*image:[[:space:]]*'\)[^']*\('.*\)$|\1${{ steps.digest.outputs.image_with_digest }}\2|" docker-compose.coolify.yml
      - name: Commit and push updated compose file
        run: |
          if git diff --quiet -- docker-compose.coolify.yml; then
            echo "No digest changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docker-compose.coolify.yml
          git commit -m "chore(ccollector): update Coolify image digest"
          git push
      - name: Show updated compose image line
        run: grep "image:" docker-compose.coolify.yml

  deploy:
    name: Deploy to VPS
    needs: update-coolify-compose
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]' && vars.RELEASE_ENABLED == 'true' && vars.DEPLOY_ENABLED == 'true'
    steps:
      - name: Trigger Coolify deploy
        run: |
          set -euo pipefail
          WEBHOOK_URL_RAW="${{ secrets.CCOLLECTOR_DEPLOY_WEBHOOK }}"
          TOKEN_RAW="${{ secrets.COOLIFY_TOKEN }}"

          WEBHOOK_URL="$(printf '%s' "$WEBHOOK_URL_RAW" | tr -d '\r\n')"
          TOKEN="$(printf '%s' "$TOKEN_RAW" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          TOKEN="${TOKEN#Bearer }"
          TOKEN="${TOKEN#bearer }"

          if [ -z "$TOKEN" ]; then
            echo "COOLIFY_TOKEN is empty after sanitization"
            exit 1
          fi

          AUTH_HEADER="Authorization: Bearer ${TOKEN}"

          call_webhook() {
            local method="$1"
            local response body status
            response=$(curl -sS -w "\n%{http_code}" -H "$AUTH_HEADER" -X "$method" "$WEBHOOK_URL")
            body=$(printf '%s' "$response" | sed '$d')
            status=$(printf '%s' "$response" | tail -n1)
            echo "$status"
            printf '%s' "$body" > /tmp/coolify_deploy_body.out
          }

          HTTP_STATUS=$(call_webhook GET)
          if [ "$HTTP_STATUS" = "405" ] || [ "$HTTP_STATUS" = "400" ]; then
            HTTP_STATUS=$(call_webhook POST)
          fi

          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "201" ] || [ "$HTTP_STATUS" = "202" ]; then
            echo "Deploy triggered successfully (status=$HTTP_STATUS)"
          else
            echo "Deploy webhook returned $HTTP_STATUS"
            echo "Response body:"
            cat /tmp/coolify_deploy_body.out || true
            exit 1
          fi
