name: Feature request
description: Propose a new capability or improvement
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or engineering problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior and scope.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List the conditions that must be true for the feature to be complete.
      placeholder: |
        - ...
        - ...
    validations:
      required: true
  - type: textarea
    id: tests
    attributes:
      label: Test plan
      description: What unit or integration tests should cover this feature?
    validations:
      required: false
