# ===== DATASOURCE =====
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.jdbc.url=${DB_JDBC_URL}
quarkus.devservices.enabled=false

# ===== HIBERNATE =====
quarkus.hibernate-orm.database.generation=validate
quarkus.hibernate-orm.packages=com.zensyra.collector.core.oauth,com.zensyra.collector.core.credential,com.zensyra.collector.core.sync,com.zensyra.collector.strava.athlete,com.zensyra.collector.strava.athletezone,com.zensyra.collector.strava.athletestats,com.zensyra.collector.strava.activity,com.zensyra.collector.strava.gear,com.zensyra.collector.strava.lap,com.zensyra.collector.strava.stream,com.zensyra.collector.strava.trainingload,com.zensyra.collector.strava.besteffort,com.zensyra.collector.strava.activitymetrics

# ===== LIQUIBASE =====
quarkus.liquibase.migrate-at-start=true
quarkus.liquibase.change-log=db/changelog/db.changelog-master.yaml

# ===== QUARTZ =====
# In prod use JDBC-backed Quartz to keep jobs across restarts and allow safe horizontal scaling.
quarkus.quartz.store-type=${QUARTZ_STORE_TYPE:ram}
quarkus.quartz.clustered=${QUARTZ_CLUSTERED:false}
quarkus.quartz.thread-count=2
quarkus.quartz.misfire-threshold=60000
%prod.quarkus.quartz.store-type=jdbc-cmt
%prod.quarkus.quartz.clustered=true

# ===== STRAVA API =====
quarkus.rest-client.strava-api.url=https://www.strava.com
quarkus.rest-client.strava-api.read-timeout=10000
quarkus.rest-client.strava-api.connect-timeout=5000
strava.streams.batch-size=${STRAVA_STREAMS_BATCH_SIZE:10}
strava.streams.retry-limit=${STRAVA_STREAMS_RETRY_LIMIT:3}

# ===== RESILIENCIA =====
quarkus.transaction-manager.default-transaction-timeout=300

# ===== OBSERVABILIDAD =====
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics

# ===== LOGGING =====
quarkus.log.level=${QUARKUS_LOG_LEVEL:INFO}
quarkus.log.category."com.zensyra".level=${ZENSYRA_LOG_LEVEL:DEBUG}
quarkus.log.console.json.enabled=true

# ===== HTTP =====
quarkus.http.port=${HTTP_PORT:8080}

# ===== ADMIN =====
admin.token=${ADMIN_TOKEN}

# ===== ENCRYPTION =====
collector.encryption.key=${COLLECTOR_ENCRYPTION_KEY}

# ===== COLLECTOR API =====
collector.api.key=${COLLECTOR_API_KEY}

# ===== NATIVE BUILD =====
quarkus.native.resources.includes=db/changelog/**,META-INF/services/**
quarkus.native.enable-https-url-handler=true
quarkus.native.native-image-xmx=6g
