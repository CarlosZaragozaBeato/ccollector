databaseChangeLog:
  - changeSet:
      id: 001-create-integration-credentials
      author: collector
      changes:
        - createTable:
            tableName: integration_credentials
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_integration_credentials

              - column:
                  name: source
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: client_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: client_secret
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

        - createIndex:
            tableName: integration_credentials
            indexName: idx_integration_credentials_source
            columns:
              - column:
                  name: source