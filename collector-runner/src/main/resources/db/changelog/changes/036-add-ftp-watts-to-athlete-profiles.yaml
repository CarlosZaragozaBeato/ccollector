databaseChangeLog:
  - changeSet:
      id: 036-add-ftp-watts-to-athlete-profiles
      author: zensyra
      comment: >
        Adds the canonical FTP value promoted from the Strava athlete sync
        (/api/v3/athlete). Null for athletes with no power data; no default,
        no history — history of FTP changes is deferred future work (Design 003).
      changes:
        - addColumn:
            tableName: athlete_profiles
            columns:
              - column:
                  name: ftp_watts
                  type: INTEGER
      rollback:
        - dropColumn:
            tableName: athlete_profiles
            columnName: ftp_watts
