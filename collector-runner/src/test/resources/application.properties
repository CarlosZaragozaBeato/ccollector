# In-memory database for tests — no external PostgreSQL
quarkus.datasource.db-kind=h2
quarkus.datasource.username=test
quarkus.datasource.password=test
quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.liquibase.enabled=false

# In-memory Quartz — no database persistence
quarkus.quartz.store-type=ram

# Disable retries in tests
Retry/enabled=false

# REST client URL for tests
quarkus.rest-client.strava-api.url=http://localhost:8089

# Strava OAuth configuration — dummy values
strava.client-id=test-client-id
strava.client-secret=test-client-secret

# Admin token for tests
admin.token=test-token-for-ci

# Encryption key for tests (AES-256-GCM, 32-byte Base64)
collector.encryption.key=UYVtd7hspZcd6gSmPxYJ+sl//4ivnUmGJHGT97ir4f4=

# API key for tests
collector.api.key=test-api-key

# Reduced logging in tests
quarkus.log.level=WARN
quarkus.log.category."com.zensyra".level=INFO
quarkus.log.console.json.enabled=false
